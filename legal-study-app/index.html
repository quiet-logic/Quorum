<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Quorum</title>
    <!-- No-flash mode init: read localStorage before first paint -->
    <script>
      (function () {
        var stored = localStorage.getItem('quorum-display-mode');
        var valid = ['system','light','dark','focus','reading','calm','visual'];
        var mode = valid.indexOf(stored) !== -1 ? stored : 'system';
        document.documentElement.setAttribute('data-mode', mode);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
