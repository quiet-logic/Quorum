<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quorum · SQE1 Revision</title>
  <meta name="description" content="Spaced repetition flashcards and MCQ practice for SQE1." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F2EC;
      --text: #1A1714;
      --muted: #8A847A;
      --border: #D8D3C8;
      --gold: #C8A96E;
      --gold-dark: #8B6914;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .wordmark {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 48px;
    }
    .desc {
      max-width: 440px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 48px;
    }
    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 12px 32px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn:hover {
      border-color: var(--gold);
      color: var(--gold-dark);
    }
    .footer {
      position: fixed;
      bottom: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .footer a { color: inherit; }
  </style>
</head>
<body>

  <p class="wordmark">Quorum.</p>
  <p class="tag">SQE1 Revision · Private Beta</p>
  <p class="desc">Spaced repetition flashcards and MCQ practice for SQE1 candidates. Invite only.</p>
  <a href="/app" class="btn">Sign in</a>

  <p class="footer">
    <a href="/privacy">Privacy</a> &middot; <a href="/terms">Terms</a>
  </p>

</body>
</html>
